<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐶 Pet the Dog Ultra</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #fff3c4, #ffcc80);
    font-family: Arial, sans-serif;
    user-select: none;
    overflow: hidden;
  }

  .container {
    text-align: center;
  }

  .dog {
    font-size: 140px;
    transition: transform 0.3s;
  }

  .happy { transform: scale(1.1); }

  .love {
    transform: scale(1.6);
    filter: drop-shadow(0 0 18px red);
  }

  .bar {
    width: 380px;
    height: 30px;
    background: #fff;
    border-radius: 15px;
    margin: 20px auto;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff9800, #ff1744);
    transition: width 0.1s;
  }

  .text {
    font-size: 18px;
    margin-top: 10px;
  }

  .loveText {
    font-size: 28px;
    color: red;
    margin-top: 15px;
    display: none;
  }

  /* 💛 Popup */
  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    padding: 25px 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    font-size: 18px;
    transition: transform 0.3s ease;
    z-index: 10;
    max-width: 300px;
  }

  .popup.show {
    transform: translate(-50%, -50%) scale(1);
  }

  .popup button {
    margin-top: 15px;
    padding: 8px 15px;
    border: none;
    border-radius: 10px;
    background: #ff9800;
    color: white;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">
  <div id="dog" class="dog">🐕</div>

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

  <div class="text" id="status">Das dauert heute wirklich lange 🐾</div>
  <div class="loveText" id="loveText">❤️ ER LIEBT DICH JETZT!</div>
</div>

<!-- 💛 Popup -->
<div id="popup" class="popup">
  🐶 Der Hund bleibt bei dir sitzen und schaut dich an...<br><br>
  „Ich weiß nicht warum… aber ich vertraue dir irgendwie.“ 🥺💛<br><br>
  <button onclick="closePopup()">Weiter streicheln</button>
</div>

<script>
  let happiness = 0;
  let petting = false;
  let loved = false;
  let popupShown = false;

  const dog = document.getElementById("dog");
  const fill = document.getElementById("fill");
  const status = document.getElementById("status");
  const loveText = document.getElementById("loveText");
  const popup = document.getElementById("popup");

  function update() {
    fill.style.width = happiness + "%";

    // 💛 Popup bei 50%
    if (happiness >= 50 && !popupShown) {
      popupShown = true;
      popup.classList.add("show");
    }

    if (happiness >= 100) {
      loved = true;
      dog.classList.add("love");
      status.innerText = "🐶 Unglaublich viel Geduld... BEST FRIENDS FOREVER!";
      loveText.style.display = "block";
    } 
    else if (happiness > 70) {
      dog.classList.add("happy");
      status.innerText = "🐶 Er vertraut dir wirklich...";
    } 
    else if (happiness > 30) {
      status.innerText = "🐾 Er überlegt noch...";
    } 
    else {
      status.innerText = "Streichle ihn weiter... wirklich lange 😄";
    }
  }

  function startPet() {
    if (!loved) petting = true;
  }

  function stopPet() {
    petting = false;
  }

  function closePopup() {
    popup.classList.remove("show");
  }

  function loop() {
    if (petting && !loved) {
      happiness += 0.125; // sehr langsam = lange Spielzeit
      if (happiness > 100) happiness = 100;
      update();
    }
    requestAnimationFrame(loop);
  }

  dog.addEventListener("mousedown", startPet);
  document.addEventListener("mouseup", stopPet);

  dog.addEventListener("touchstart", startPet);
  document.addEventListener("touchend", stopPet);

  loop();
</script>

</body>
</html>
