<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus & Ideas Hub</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --accent:#38bdf8;
    --accent2:#818cf8;
    --text:#f8fafc;
    --success:#22c55e;
}

.light{
    --bg:#f1f5f9;
    --card:#ffffff;
    --text:#0f172a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background:linear-gradient(135deg,var(--bg),#111827);
    color:var(--text);
    min-height:100vh;
    transition:0.4s;
}

header{
    padding:30px;
    text-align:center;
}

h1{
    font-size:3rem;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    opacity:.8;
    margin-top:10px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

button{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    margin-top:10px;
    transition:.25s;
}

button:hover{
    transform:translateY(-2px) scale(1.03);
}

.idea{
    margin-top:15px;
    font-size:1.2rem;
    min-height:50px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

ul{
    list-style:none;
    margin-top:15px;
}

li{
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.points{
    font-size:3rem;
    text-align:center;
    color:gold;
    margin-top:15px;
}

.themeBtn{
    position:fixed;
    right:20px;
    top:20px;
}

.footer{
    text-align:center;
    padding:30px;
    opacity:.7;
}

canvas{
    width:100%;
    height:180px;
    background:#000;
    border-radius:15px;
}
</style>
</head>
<body>

<button class="themeBtn" onclick="toggleTheme()">🌙 / ☀️</button>

<header>
    <h1>Focus & Ideas Hub</h1>
    <p class="subtitle">Ideen sammeln, Aufgaben erledigen und Punkte verdienen</p>
</header>

<div class="container">

    <div class="card">
        <h2>💡 Ideen-Generator</h2>
        <p>Klicke für eine zufällige Projektidee:</p>
        <button onclick="generateIdea()">Idee erzeugen</button>
        <div class="idea" id="ideaBox"></div>
    </div>

    <div class="card">
        <h2>✅ Aufgabenliste</h2>
        <input id="taskInput" placeholder="Neue Aufgabe...">
        <button onclick="addTask()">Aufgabe hinzufügen</button>
        <ul id="taskList"></ul>
    </div>

    <div class="card">
        <h2>🏆 Punkte</h2>
        <div class="points" id="points">0</div>
        <p style="text-align:center">
            Für jede erledigte Aufgabe erhältst du 10 Punkte.
        </p>
    </div>

    <div class="card">
        <h2>🎨 Partikel-Spielzeug</h2>
        <canvas id="canvas" width="500" height="180"></canvas>
        <button onclick="spawnParticles()">Mehr Partikel</button>
    </div>

</div>

<div class="footer">
    Erstellt mit HTML, CSS und JavaScript
</div>

<script>
const ideas = [
"Baue eine Wetter-App",
"Erstelle ein eigenes Spiel",
"Programmiere einen KI-Chatbot",
"Entwickle eine Fitness-App",
"Starte einen Technik-Blog",
"Baue einen Passwort-Generator",
"Erstelle ein Lernquiz",
"Programmiere einen Musik-Player",
"Entwickle einen Habit-Tracker",
"Baue ein Smart-Home-Dashboard"
];

function generateIdea(){
    const idea = ideas[Math.floor(Math.random()*ideas.length)];
    document.getElementById("ideaBox").textContent = idea;
}

let score = 0;

function addTask(){
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if(!text) return;

    const li = document.createElement("li");

    const span = document.createElement("span");
    span.textContent = text;

    const btn = document.createElement("button");
    btn.textContent = "Erledigt";

    btn.onclick = ()=>{
        li.remove();
        score += 10;
        document.getElementById("points").textContent = score;
    };

    li.appendChild(span);
    li.appendChild(btn);

    document.getElementById("taskList").appendChild(li);

    input.value="";
}

function toggleTheme(){
    document.body.classList.toggle("light");
}

/* Partikelanimation */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles=[];

function spawnParticles(){
    for(let i=0;i<25;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4,
            size:Math.random()*4+2
        });
    }
}

spawnParticles();

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;

        if(p.x<0||p.x>canvas.width)p.vx*=-1;
        if(p.y<0||p.y>canvas.height)p.vy*=-1;

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=`hsl(${p.x%360},100%,60%)`;
        ctx.fill();
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
