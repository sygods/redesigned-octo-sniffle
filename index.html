<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 Schnuffi Wuffii</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle,#fff6d5,#ffd180);
    font-family:Arial,sans-serif;
    overflow:hidden;
    user-select:none;
}

.container{
    text-align:center;
    max-width:500px;
    padding:20px;
}

.dog{
    font-size:150px;
}

#heartContainer{
    width:100px;
    height:90px;
    margin:20px auto;
}

#gift{
    font-size:50px;
    height:60px;
}

.text{
    font-size:22px;
    color:#555;
    min-height:60px;
    margin-top:15px;
}

.loveText{
    display:none;
    font-size:30px;
    color:#ff4081;
    margin-top:20px;
    font-weight:bold;
}

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    max-width:320px;
    transition:0.3s;
    z-index:100;
}

.popup.show{
    transform:translate(-50%,-50%) scale(1);
}

.popup button{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    background:#ff9800;
    color:white;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

    <div class="dog">🐶</div>

    <!-- ❤️ SVG HEART (FIX) -->
    <div id="heartContainer">

        <svg viewBox="0 0 100 90" width="100" height="90">

            <!-- Background -->
            <path d="M50 82 L15 45 A18 18 0 1 1 50 25 A18 18 0 1 1 85 45 Z"
                  fill="#ddd"/>

            <!-- Fill -->
            <clipPath id="heartClip">
                <rect id="clipRect" x="0" y="0" width="0" height="90"></rect>
            </clipPath>

            <path d="M50 82 L15 45 A18 18 0 1 1 50 25 A18 18 0 1 1 85 45 Z"
                  fill="#ff4081"
                  clip-path="url(#heartClip)"/>

        </svg>

    </div>

    <div id="gift"></div>

    <div id="status" class="text">🐶 Wer bisch du?</div>

    <div id="loveText" class="loveText">💖 Schnuffi liebt dich!</div>

</div>

<div id="popup" class="popup"></div>

<script>

const playerName = prompt("🐶 Wie heissisch?") || "Fründ";

let happiness = 0;
let petting = false;
let loved = false;
let popupShown = false;
let finalPopupShown = false;
let cuddleTimer = 0;

const gift = document.getElementById("gift");
const status = document.getElementById("status");
const loveText = document.getElementById("loveText");
const popup = document.getElementById("popup");

const clipRect = document.getElementById("clipRect");

function closePopup(){
    popup.classList.remove("show");
}

function update(){

    // ❤️ HEART FILL
    clipRect.setAttribute("width", happiness);

    if(happiness < 25){

        gift.innerHTML = "";
        status.innerText = "🐶 Wer bisch du?";

    } else if(happiness < 50){

        gift.innerHTML = "🦴";
        status.innerText = "🐶 Du chasch mi striichle... aber nur es bitzli.";

        if(!popupShown){
            popupShown = true;
            popup.innerHTML = "🐶💛<br><br>Ich glaube du meinsch es guet...<br><br>Da, en Chnoche für dich. 🦴<br><br><button onclick='closePopup()'>Aww</button>";
            popup.classList.add("show");
        }

    } else if(happiness < 75){

        status.innerText = "🐾 Ich glaub du bisch lieb.";

    } else if(happiness < 100){

        status.innerText = "🥺 Chasch no es bitzli bliibe?";

    }

    if(happiness >= 100){

        loved = true;

        status.innerText = `❤️ ${playerName}, du bisch jetzt mini Familie.`;
        loveText.style.display = "block";

        if(!finalPopupShown){

            finalPopupShown = true;

            setTimeout(()=>{
                popup.innerHTML = `
                🐶💛<br><br>
                "${playerName}... danke dass du bi mir blibe bisch." 🥺❤️<br><br>
                <button onclick="closePopup()">❤️</button>
                `;
                popup.classList.add("show");
            },1000);
        }
    }
}

function startPet(){ petting = true; }
function stopPet(){ petting = false; }

function loop(){

    if(petting && !loved){

        happiness += 0.12;
        if(happiness > 100) happiness = 100;

        update();
    }

    if(petting && loved){

        cuddleTimer++;

        if(cuddleTimer > 600 && !window.secretEnding){

            window.secretEnding = true;

            popup.innerHTML = `
            🐶🫂<br><br>
            Darf ich ehrlich sii?<br><br>
            Ich ha di scho bi 30% gärn gha. 🥹❤️<br><br>
            <button onclick="closePopup()">AWWWW</button>
            `;

            popup.classList.add("show");

            document.body.style.background =
            "linear-gradient(135deg,#ffd180,#ffab91)";
        }
    }

    requestAnimationFrame(loop);
}

const dog = document.querySelector(".dog");

dog.addEventListener("mousedown", startPet);
document.addEventListener("mouseup", stopPet);

dog.addEventListener("touchstart", startPet);
document.addEventListener("touchend", stopPet);
document.addEventListener("touchcancel", stopPet);

loop();

</script>

</body>
</html>
